services:
  rssbot:
    build: .
    container_name: rss-discord-bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./config:/app/config
      - C:/Users/stacy/rssbot-runtime-data:/app/data
      - ./logs:/app/logs
    environment:
      CONFIG_PATH: /app/config/config.json
      DATABASE_PATH: /app/data/rssbot.sqlite
      LOG_LEVEL: INFO
      ROUTING_DEBUG_EMBEDS: "false"
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
